<section id="certifications" class="certs-section">
  <div class="section-container">

    <div class="section-header" appScrollReveal>
      <span class="section-label">Credentials</span>
      <h2 class="section-title" appGlitchText="Certifications & Achievements">Certifications & Achievements</h2>
      <p class="section-subtitle">Courses, assessments and challenges completed</p>
    </div>

    <!-- Loading skeletons -->
    <div class="certs-grid" *ngIf="isLoading()">
      <div class="skeleton-cert" *ngFor="let i of [1,2,3,4,5,6]">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>
    </div>

    <!-- Certifications grid -->
    <div class="certs-grid" *ngIf="!isLoading()">
      <div
        class="cert-card"
        *ngFor="let cert of certifications(); let i = index"
        appScrollReveal
        [revealDelay]="i * 60" appSpotlight
      >
        <!-- Image -->
        <div class="cert-image-wrapper">
          <img
            [src]="getImagePath(cert.image)"
            [alt]="cert.title"
            class="cert-image"
            loading="lazy"
            (error)="$any($event.target).style.display = 'none'"
          />
        </div>

        <!-- Body -->
        <div class="cert-body">
          <span class="cert-type" [class]="'cert-type--' + getTypeColor(cert.type)">
            {{ getTypeLabel(cert.type) }}
          </span>
          <h3 class="cert-title">{{ cert.title }}</h3>
          <p class="cert-issuer">{{ cert.issuer }}</p>
        </div>

        <!-- Links -->
        <div class="cert-links">
<a
            [href]="cert.certificateUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="cert-link"
          >
            Certificate
            <svg width="12" height="12" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
<a
            *ngIf="cert.badgeUrl"
            [href]="cert.badgeUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="cert-link cert-link--badge"
          >
            Badge
            <svg width="12" height="12" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

  </div>
</section>
