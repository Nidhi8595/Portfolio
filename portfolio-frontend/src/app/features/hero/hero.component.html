<section id="hero" class="hero-section">
  <app-code-rain />
  <!-- Animated background particles -->
  <div class="particles" aria-hidden="true">
    <span
      *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
      class="particle"
      [class]="'particle particle--' + i"
    >
    </span>
  </div>

  <!-- Main content -->
  <div class="hero-container">
    <!-- Left: Text content -->
    <div class="hero-text">
      <!-- Greeting badge -->
      <div class="greeting-badge" appScrollReveal [revealDelay]="0">
        <span class="badge-dot"></span>
        Available for opportunities
      </div>

      <!-- Main heading -->
      <h1 class="hero-heading" appScrollReveal [revealDelay]="100">
        Hey, Myself
        <span class="hero-name">Neelakshi</span>
      </h1>

      <!-- Typewriter role -->
      <h2 class="hero-role" appScrollReveal [revealDelay]="200">
        <span class="role-prefix">I'm a </span>
        <span
          class="role-text"
          [appTypewriter]="roles"
          [typeSpeed]="75"
          [deleteSpeed]="40"
          [pauseTime]="1800"
        ></span>
        <span class="cursor">|</span>
      </h2>

      <!-- Description -->
      <p class="hero-description" appScrollReveal [revealDelay]="300">
        Final-year CSE student with a strong grip on DSA (C++) and hands-on experience building
        full-stack applications using React, Angular, NestJS, and MongoDB. Currently exploring AI
        and Cloud to level up my impact.
      </p>

      <!-- Tech badges -->
      <div class="tech-badges" appScrollReveal [revealDelay]="400">
        <span *ngFor="let badge of techBadges" class="tech-badge">
          {{ badge }}
        </span>
      </div>

      <!-- CTA Buttons -->
      <div class="hero-actions" appScrollReveal [revealDelay]="500">
        <button class="btn-primary" (click)="scrollToProjects()" appMagnetic>
          View My Work
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
          </svg>
        </button>
        <a
          href="https://github.com/Nidhi8595"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-secondary" appMagnetic
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31
                     3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
                     0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735
                     -4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225
                     -1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23
                     1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305
                     .765-1.605-2.67-.3-5.46-1.335-5.46-5.925
                     0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12
                     -3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405
                     3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23
                     3.3-1.23.66 1.65.24 2.88.12 3.18.765.84
                     1.23 1.905 1.23 3.225 0 4.605-2.805 5.625
                     -5.475 5.925.435.375.81 1.095.81 2.22
                     0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57
                     A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          GitHub
        </a>
        <app-sound-wave />
      </div>
    </div>

    <!-- Right: Profile image -->
    <div class="hero-image-wrapper" appScrollReveal [revealDelay]="200">
      <div class="image-ring"></div>
      <div class="image-container">
        <img
          src="../../../assets/images/Pp.jpg"
          alt="Neelakshi — Full Stack Developer"
          class="profile-image"
          loading="eager"
        />
      </div>
    </div>
  </div>

  <!-- Scroll down indicator -->
  <button class="scroll-indicator" (click)="scrollDown()" aria-label="Scroll down">
    <span class="scroll-text">Scroll</span>
    <div class="scroll-arrow">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <polyline points="19 12 12 19 5 12" />
      </svg>
    </div>
  </button>
  <!-- Stats bar -->

  <div class="stat-item" *ngFor="let stat of stats">
    <span
      class="stat-number"
      [attr.data-target]="stat.value"
      appCountUp
    >0</span>
    <span class="stat-suffix">{{ stat.suffix }}</span>
    <span class="stat-label">{{ stat.label }}</span>
  </div>
</div> -->
</section>
